services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - path: .env
        required: false
    environment:
      RAILS_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: app
      DB_PASSWORD: password
      REDIS_URL: redis://redis:6379/1
      PLATFORM_BASE_HOST: localhost
      PLATFORM_APP_NETWORK: hobby-apps
      PLATFORM_INTERNAL_TOKEN: local-dev-token
    ports:
      - "80:3000"
      - "3000:3000"
    volumes:
      - .:/rails
      - bundle:/usr/local/bundle
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - default
      - app_runtime
    stdin_open: true
    tty: true

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app_development
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app_development"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  bundle:
  postgres-data:
  redis-data:

networks:
  app_runtime:
    name: hobby-apps
    internal: true
